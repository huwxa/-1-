<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 1학기 전공기초중국어 문화 기말 정리하기</title>
<style>
  :root{
    --paper:#faf7f0; --card:#ffffff; --ink:#2c2a26; --sub:#6b665d;
    --line:#eae4d8; --yellow:#ffd95e; --yellow-soft:#fff1c2;
    --blue:#a9d6f0; --blue-soft:#e3f2fb; --pink:#f4cdce; --pink-soft:#fbe9ea;
    --green:#3aa564; --red:#d9534f; --accent:#3b3a36;
    --shadow:0 6px 22px rgba(60,55,45,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.6;
    background-image:radial-gradient(circle at 12% 10%, #fff6da 0, transparent 38%),radial-gradient(circle at 88% 90%, #e7f3fb 0, transparent 40%);
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px 80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:26px 22px}
  h1,h2,h3{margin:0 0 6px;line-height:1.25}
  .muted{color:var(--sub)}
  .center{text-align:center}
  .tab{display:inline-block;background:var(--yellow-soft);border:1px solid #f3e2a8;color:#7a5b00;
    font-weight:700;font-size:13px;padding:4px 12px;border-radius:999px;margin-bottom:10px}
  button{font-family:inherit;cursor:pointer;border:none}
  .btn{background:var(--yellow);color:#3a2f00;font-weight:800;font-size:17px;padding:14px 22px;border-radius:14px;
    border:1px solid #f0c948;box-shadow:0 3px 0 #e9bd3a;transition:transform .05s, box-shadow .05s;width:100%}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #e9bd3a}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:0 3px 0 var(--line)}
  .btn.ghost:active{box-shadow:0 1px 0 var(--line)}
  .field{margin:14px 0}
  .field label{display:block;font-weight:700;font-size:14px;margin-bottom:6px}
  input[type=text],input[type=password]{width:100%;font-size:17px;padding:13px 14px;border:1.5px solid var(--line);
    border-radius:12px;background:#fffdf8;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--yellow)}
  .title-hero{font-size:30px;font-weight:900;letter-spacing:-.5px}
  .title-hero .ck{color:#c79a00;font-weight:900;margin-left:4px;letter-spacing:2px}
  .stamp{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:14px;
    background:#c0392b;color:#fff;font-weight:900;font-size:30px;box-shadow:0 4px 12px rgba(192,57,43,.35);
    border:3px solid #a93226;transform:rotate(-4deg);font-family:serif}
  .lvl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
  @media(max-width:520px){.lvl-grid{grid-template-columns:repeat(2,1fr)}.title-hero{font-size:24px}}
  .lvl-btn{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:16px 8px;text-align:center;
    font-weight:800;font-size:16px;color:var(--ink);box-shadow:0 3px 0 var(--line);transition:.08s}
  .lvl-btn .sub{display:block;font-size:11px;font-weight:600;color:var(--sub);margin-top:3px}
  .lvl-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--line)}
  .lvl-btn.sel{border-color:var(--yellow);background:var(--yellow-soft);box-shadow:0 3px 0 #f0c948}
  .lvl-btn:disabled{opacity:.32;cursor:not-allowed}
  .progress-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:10px}
  .pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 11px}
  .pill.u{background:var(--blue-soft);border-color:#cfe7f6;color:#2e6f99}
  .timerbar{height:8px;background:#eee;border-radius:999px;overflow:hidden;margin:6px 0 18px}
  .timerbar > i{display:block;height:100%;background:linear-gradient(90deg,#7ec98a,#ffd95e);transition:width 1s linear}
  .timerbar.warn > i{background:linear-gradient(90deg,#ffb74d,#d9534f)}
  .qno{font-size:13px;font-weight:800;color:#c79a00;letter-spacing:.5px}
  .qtext{font-size:20px;font-weight:800;margin:6px 0 4px;line-height:1.4}
  .passage{background:var(--pink-soft);border:1px solid #f1d6d7;border-radius:12px;padding:13px 14px;margin:12px 0;font-size:15px;white-space:pre-wrap}
  .passage b{color:#b5403c}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .opt{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1.5px solid var(--line);border-radius:13px;
    padding:13px 14px;font-size:16px;text-align:left;transition:.08s;width:100%;color:var(--ink)}
  .opt:active{transform:scale(.99)}
  .opt .k{flex:0 0 26px;height:26px;border-radius:8px;background:#f3efe6;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--sub)}
  .opt.sel{border-color:var(--yellow);background:var(--yellow-soft)}
  .opt.sel .k{background:var(--yellow);color:#3a2f00}
  .short-in{margin-top:14px}
  .feedback{margin-top:16px}
  .res-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .score-big{font-size:40px;font-weight:900;line-height:1}
  .donut{--p:0;width:96px;height:96px;border-radius:50%;flex:0 0 auto;
    background:conic-gradient(var(--green) calc(var(--p)*1%), #efe9dd 0);display:flex;align-items:center;justify-content:center}
  .donut > span{width:70px;height:70px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px}
  .qreview{border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px}
  .qreview.wrong{border-color:#f0c2c1;background:#fdf3f3}
  .qreview.ok{border-color:#cfe9d6;background:#f4fbf6}
  .tagrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;background:#f1ece1;color:var(--sub)}
  .tag.lv{background:var(--yellow-soft);color:#8a6800}
  .tag.un{background:var(--blue-soft);color:#2e6f99}
  .tag.ty{background:#efe7f7;color:#6b48a3}
  .ans-line{font-size:14px;margin:3px 0}
  .ans-line .x{color:var(--red);font-weight:800}
  .ans-line .o{color:var(--green);font-weight:800}
  .explain{background:#fff;border:1px dashed #e2dccf;border-radius:10px;padding:11px 12px;margin-top:9px;font-size:14.5px}
  .bar{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:14px}
  .bar .lab{flex:0 0 96px;font-weight:700}
  .bar .track{flex:1;background:#efe9dd;border-radius:999px;height:16px;overflow:hidden}
  .bar .track > i{display:block;height:100%;border-radius:999px;background:var(--blue)}
  .bar .track > i.r{background:#e88a87}
  .bar .val{flex:0 0 64px;text-align:right;font-weight:800;color:var(--sub);font-size:13px}
  .weak{background:var(--pink-soft);border:1px solid #f1d6d7;border-radius:12px;padding:13px 15px;margin-top:12px}
  .weak h4{margin:0 0 6px;color:#b5403c}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .chip{background:#fff;border:1px solid #f1d6d7;border-radius:999px;padding:5px 11px;font-size:13px;font-weight:700;color:#a83b37}
  .divider{height:1px;background:var(--line);margin:18px 0}
  .stu-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 14px;border:1px solid var(--line);
    border-radius:12px;margin-bottom:9px;background:#fff;cursor:pointer;transition:.08s}
  .stu-row:active{transform:scale(.995)}
  .stu-row .rank{flex:0 0 30px;height:30px;border-radius:9px;background:var(--yellow-soft);display:flex;align-items:center;justify-content:center;font-weight:900;color:#8a6800}
  .stu-row .nm{flex:1;font-weight:800;font-size:16px}
  .stu-row .sc{font-weight:900;font-size:17px}
  .badge{display:inline-block;background:#c0392b;color:#fff;font-size:12px;font-weight:800;padding:3px 10px;border-radius:999px}
  .back{background:none;border:none;color:var(--sub);font-weight:700;font-size:14px;padding:6px 0;cursor:pointer}
  .hint{font-size:13px;color:var(--sub);margin-top:8px}
  .err{color:var(--red);font-size:13px;font-weight:700;margin-top:6px;min-height:18px}
  .small{font-size:13px}
  .kbd{font:inherit;background:#f3efe6;border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:12px;font-weight:700}
  .footnote{text-align:center;color:#b6b0a3;font-size:12px;margin-top:22px}
  a.link{color:#2e6f99;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="footnote">전공기초중국어 · 문화 단원 기말 대비 · 혼자서도 단계별로 풀어보세요</div>

<script>
/* ============================ 데이터 ============================ */
const LEVELS = ["기초","하","중","상","최상","심화"];
const LEVEL_SUB = {"기초":"warm-up","하":"easy","중":"medium","상":"hard","최상":"expert","심화":"master"};
const TYPE_LABEL = {mc:"객관식", short:"단답형", analysis:"보기분석"};

/* answer: mc/analysis -> 정답 인덱스 / short -> 허용답 배열 */
const QUESTIONS = [
/* ---------------- 기초 ---------------- */
{lv:"기초",ty:"mc",un:"단어",cc:"보충단어",q:"다음 중 '教师节(Jiàoshījié)'의 뜻으로 알맞은 것은?",o:["스승의 날","발렌타인 데이","어린이날","명절"],a:0,e:"教师节 = 스승의 날. 节日(jiérì)는 '기념일·명절'을 뜻해요."},
{lv:"기초",ty:"mc",un:"단어",cc:"보충단어",q:"'발렌타인 데이'를 뜻하는 중국어는?",o:["情人节","教师节","节日","午觉"],a:0,e:"情人节(Qíngrénjié) = 발렌타인 데이."},
{lv:"기초",ty:"short",un:"단어",cc:"보충단어",q:"'午觉(wǔjiào)'의 뜻을 한국어로 쓰세요.",a:["낮잠"],e:"午觉(wǔjiào) = 낮잠. 睡(shuì)는 '자다'."},
{lv:"기초",ty:"mc",un:"단어",cc:"보충단어",q:"'作业(zuòyè)'의 뜻은?",o:["숙제","수업","시험","운동"],a:0,e:"作业(zuòyè) = 숙제."},
{lv:"기초",ty:"mc",un:"단어",cc:"보충단어",q:"'完(wán)'의 뜻은?",o:["마치다","시작하다","받다","자다"],a:0,e:"完(wán) = 마치다. 开始(kāishǐ) 시작하다 ↔ 结束(jiéshù) 끝나다."},
{lv:"기초",ty:"mc",un:"화폐",cc:"지폐 명소",q:"1元 지폐 뒷면에 그려진 명소는?",o:["西湖(서호)","泰山(태산)","桂林(계림)","布达拉宫(포탈라궁)"],a:0,e:"1元 = 항저우 西湖(서호) 三潭印月."},
{lv:"기초",ty:"mc",un:"화폐",cc:"지폐 명소",q:"100元 지폐 뒷면의 명소는?",o:["人民大会堂(인민대회당)","故宫(자금성)","长城(만리장성)","天安门(천안문)"],a:0,e:"100元 = 베이징 人民大会堂(인민대회당)."},
{lv:"기초",ty:"mc",un:"언어",cc:"중국어 위상",q:"모국어(사용 인구) 기준으로 세계에서 가장 많이 쓰이는 언어는?",o:["중국어","영어","스페인어","힌디어"],a:0,e:"중국어가 28.9%로 가장 높아요(영어 17%)."},
{lv:"기초",ty:"mc",un:"언어",cc:"한자 구조",q:"한자 日, 月처럼 사물의 외형을 본떠 만든 한자 구조는?",o:["상형","지사","회의","형성"],a:0,e:"상형(象形): 사물의 외형을 모방하여 만든 글자(日·月)."},
{lv:"기초",ty:"mc",un:"교통",cc:"고속열차 등급",q:"알파벳 'G'로 시작하는, 가장 빠른 고속철도는?",o:["高铁(gāotiě)","动车(dòngchē)","城际(chéngjì)","直达(zhídá)"],a:0,e:"G = 高铁(가장 빠른 고속철도)."},
{lv:"기초",ty:"mc",un:"음식",cc:"4대 요리",q:"'麻婆豆腐(마파두부)'가 속한 중국 4대 요리는?",o:["사천요리(川菜)","산동요리(鲁菜)","광동요리(粤菜)","강소요리(苏菜)"],a:0,e:"마파두부는 川菜(사천요리)의 대표 음식."},
{lv:"기초",ty:"short",un:"단어",cc:"반의어",q:"'高(gāo, 높다)'의 반대말을 한자(또는 한국어)로 쓰세요.",a:["低","dī","낮다"],e:"高(높다) ↔ 低(dī, 낮다)."},
{lv:"기초",ty:"mc",un:"교통",cc:"교통 발달",q:"1980년대 이전 중국을 대표하던 교통수단은?",o:["자전거","오토바이","자동차","고속철도"],a:0,e:"이전:자전거 → 80년대 후:오토바이 → 90년대 후:자동차."},
{lv:"기초",ty:"short",un:"화폐",cc:"화폐 단위",q:"중국 화폐의 기본 단위를 쓰세요. (한자 또는 한국어)",a:["元","위안","yuán","yuan"],e:"중국 화폐 단위 = 元(위안)."},
{lv:"기초",ty:"mc",un:"언어",cc:"갑골문",q:"중국에서 발견된 가장 오래된 체계적인 문자는?",o:["甲骨文(갑골문)","楷书(해서)","行书(행서)","简体字(간체자)"],a:0,e:"갑골문(甲骨文): 거북 껍질·뼈에 새긴, 가장 오래된 체계적 문자."},

/* ---------------- 하 ---------------- */
{lv:"하",ty:"mc",un:"단어",cc:"병음",q:"'运动(운동하다)'의 올바른 병음은?",o:["yùndòng","yùndǒng","yóndòng","yùntòng"],a:0,e:"运动 = yùndòng."},
{lv:"하",ty:"short",un:"단어",cc:"반의어",q:"'开始(시작하다)'의 반대말 '끝나다'를 중국어로 쓰세요.",a:["结束","jiéshù","jieshu"],e:"开始(시작하다) ↔ 结束(jiéshù, 끝나다)."},
{lv:"하",ty:"mc",un:"화폐",cc:"명소 위치",q:"5元 뒷면의 泰山(태산)이 위치한 성(省)은?",o:["산동성","쓰촨성","광둥성","후베이성"],a:0,e:"泰山은 山东(산동성) 타이안시에 위치."},
{lv:"하",ty:"mc",un:"화폐",cc:"명소 위치",q:"20元 뒷면의 桂林(계림)이 속한 행정구역은?",o:["광시좡족자치구","티베트자치구","네이멍구","신장위구르"],a:0,e:"桂林은 广西壮族自治区(광시좡족자치구) 동북부의 도시."},
{lv:"하",ty:"mc",un:"언어",cc:"성조",q:"고대 평성(平)에서 갈라진 현대 성조 중 '제1성'의 명칭은?",o:["음평","양평","상성","거성"],a:0,e:"평(平) → 음평(1성)·양평(2성)으로 분화."},
{lv:"하",ty:"mc",un:"언어",cc:"한자 구조",q:"上, 下처럼 지시부호·상징기호로 의미를 나타내는 한자 구조는?",o:["지사","상형","회의","형성"],a:0,e:"지사(指事): 상징 기호나 상형자에 지시부호를 더한 글자(上·下)."},
{lv:"하",ty:"mc",un:"음식",cc:"요리 이름",q:"'蛋炒饭(dànchǎofàn)'에 들어 있는 조리법(炒)은?",o:["볶기","삶기","튀기기","데우기"],a:0,e:"炒(chǎo) = 볶기. 鸡蛋(계란)+饭(밥)을 볶은 요리."},
{lv:"하",ty:"mc",un:"음식",cc:"요리 이름",q:"'炖鸡汤'의 '炖(dùn)'이 뜻하는 조리법은?",o:["푹 삶기","볶기","튀기기","굽기"],a:0,e:"炖(dùn) = 푹 삶기. 鸡(닭)+汤(탕)."},
{lv:"하",ty:"mc",un:"교통",cc:"좌석 종류",q:"좌석 '硬座(yìngzuò)'의 뜻은?",o:["딱딱한 좌석(일반석)","부드러운 좌석","딱딱한 침대","부드러운 침대"],a:0,e:"硬座=딱딱한 좌석, 软座=부드러운 좌석, 硬卧=딱딱한 침대, 软卧=부드러운 침대."},
{lv:"하",ty:"mc",un:"교통",cc:"교통 발달",q:"'서고동저' 지형의 영향으로 교통이 더 발달한 지역은?",o:["동부","서부","남부","북부"],a:0,e:"철도·고속도로·해운 모두 동부 중심으로 발달, 서부는 상대적으로 더딤."},
{lv:"하",ty:"short",un:"단어",cc:"보충단어",q:"'个子(gèzi)'의 뜻을 쓰세요.",a:["키"],e:"个子(gèzi) = 키."},

/* ============================ 유틸 ============================ */
function $(sel,el){return (el||document).querySelector(sel)}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function passageHTML(p){return esc(p).replace(/&lt;보기&gt;/g,"<b>&lt;보기&gt;</b>")}
function norm(s){
  if(s==null)return"";
  let t=String(s).trim().toLowerCase();
  const map={"ā":"a","á":"a","ǎ":"a","à":"a","ē":"e","é":"e","ě":"e","è":"e",
    "ī":"i","í":"i","ǐ":"i","ì":"i","ō":"o","ó":"o","ǒ":"o","ò":"o",
    "ū":"u","ú":"u","ǔ":"u","ù":"u","ǖ":"u","ǘ":"u","ǚ":"u","ǜ":"u","ü":"u"};
  t=t.replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜü]/g,c=>map[c]||c);
  t=t.replace(/[\s.,!?·、，。！？\/'"()]/g,"");
  return t;
}
function getByLevel(lv){return QUESTIONS.filter(q=>q.lv===lv)}
function safeKey(name){return "result:"+String(name).replace(/[\s'"\/\\]/g,"_")}

      b.addEventListener("click",()=>{

        b.classList.add("sel");

      });

function startTimer(){
  S.timeLeft=30;
  const bar=$("#tbar");const fill=bar?bar.querySelector("i"):null;
  if(fill)fill.style.width="100%";
  S.timer=setInterval(()=>{
    S.timeLeft--;
    const pct=Math.max(0,S.timeLeft/30*100);
    if(fill)fill.style.width=pct+"%";
    if(bar){if(S.timeLeft<=10)bar.classList.add("warn");else bar.classList.remove("warn")}
    if(S.timeLeft<=0){clearTimer();timeoutSubmit()}
  },1000);
}
function timeoutSubmit(){
  const q=S.levelQs[S.curQIdx];
  if(q.ty==="short"){lockSubmit(($("#sa")&&$("#sa").value)||"",true)}
  else{lockSubmit(S.selected,true)}
}
function lockSubmit(user,timedOut){
  clearTimer();
  const q=S.levelQs[S.curQIdx];
  let correct=false,userText="",correctText="";
  if(q.ty==="short"){
    userText=(user||"").trim()|| (timedOut?"(시간 초과)":"(미입력)");
    correct=q.a.some(ac=>norm(ac)===norm(user));
    correctText=q.a[0];
  }else{
    if(user==null){userText=timedOut?"(시간 초과)":"(미선택)";correct=false;}
    else{userText=q.o[user];correct=(user===q.a);}
    correctText=q.o[q.a];
  }
  S.results.push({lv:q.lv,un:q.un,ty:q.ty,cc:q.cc,q:q.q,p:q.p||"",o:q.o||null,
    correct,user:userText,correctAns:correctText,e:q.e});
  // 다음 문제
  if(S.curQIdx < S.levelQs.length-1){S.curQIdx++;renderQuestion();}
  else{renderLevelResult();}
}

/* ============================ 통계 계산 ============================ */
function computeStats(items){
  const total=items.length, correct=items.filter(r=>r.correct).length;
  const byLevel={},byType={},byUnit={},byConcept={};
  items.forEach(r=>{
    (byLevel[r.lv]=byLevel[r.lv]||{c:0,t:0}).t++; if(r.correct)byLevel[r.lv].c++;
    (byType[r.ty]=byType[r.ty]||{c:0,t:0}).t++; if(r.correct)byType[r.ty].c++;
    (byUnit[r.un]=byUnit[r.un]||{c:0,t:0}).t++; if(r.correct)byUnit[r.un].c++;
    (byConcept[r.cc]=byConcept[r.cc]||{c:0,t:0}).t++; if(r.correct)byConcept[r.cc].c++;
  });
  // 취약 단원/개념 (오답률 높은 순, 오답 1개 이상)
  const weakUnits=Object.entries(byUnit).map(([k,v])=>({k,err:(v.t-v.c)/v.t,wrong:v.t-v.c}))
    .filter(x=>x.wrong>0).sort((a,b)=>b.err-a.err||b.wrong-a.wrong);
  const weakConcepts=Object.entries(byConcept).map(([k,v])=>({k,wrong:v.t-v.c,t:v.t}))
    .filter(x=>x.wrong>0).sort((a,b)=>b.wrong-a.wrong);
  return {total,correct,byLevel,byType,byUnit,byConcept,weakUnits,weakConcepts};
}
function barRow(label,c,t,redIfBad){
  const errPct=t?Math.round((t-c)/t*100):0;
  const okPct=t?Math.round(c/t*100):0;
  const bad=redIfBad&&errPct>=50;
  return `<div class="bar"><span class="lab">${esc(label)}</span>
    <span class="track"><i class="${bad?'r':''}" style="width:${okPct}%"></i></span>
    <span class="val">${c}/${t} (${okPct}%)</span></div>`;
}

/* ============================ 7. 최종 리포트 ============================ */
function reportInnerHTML(items,name){
  const st=computeStats(items);
  const accPct=Math.round(st.correct/st.total*100);
  const errPct=100-accPct;
  let h=`<div class="res-head">
    <div class="donut" style="--p:${accPct}"><span>${accPct}%</span></div>
    <div><div class="score-big">${st.correct}<span style="font-size:20px;color:var(--sub)"> / ${st.total}</span></div>
    <div class="muted small">전체 정답률 ${accPct}% · 오답률 ${errPct}%</div></div></div>`;

  h+=`<div class="divider"></div><h3>난이도(단계)별 정답률</h3>`;
  LEVELS.forEach(lv=>{if(st.byLevel[lv])h+=barRow(lv,st.byLevel[lv].c,st.byLevel[lv].t,true)});

  h+=`<div class="divider"></div><h3>유형별 정답률</h3>`;
  ["mc","short","analysis"].forEach(ty=>{if(st.byType[ty])h+=barRow(TYPE_LABEL[ty],st.byType[ty].c,st.byType[ty].t,true)});

  h+=`<div class="divider"></div><h3>단원별 정답률</h3>`;
  Object.keys(st.byUnit).forEach(un=>{h+=barRow(un,st.byUnit[un].c,st.byUnit[un].t,true)});

  // 취약 단원/개념
  h+=`<div class="weak"><h4>📌 취약 단원</h4>`;
  if(st.weakUnits.length===0)h+=`<div class="small">취약 단원 없음 — 단원별로 고르게 잘했어요!</div>`;
  else{h+=`<div class="chips">`+st.weakUnits.map(u=>`<span class="chip">${esc(u.k)} · 오답 ${u.wrong}개</span>`).join("")+`</div>`;}
  h+=`</div>`;

  h+=`<div class="weak"><h4>📌 취약 개념 (집중 복습)</h4>`;
  if(st.weakConcepts.length===0)h+=`<div class="small">취약 개념 없음 — 훌륭해요!</div>`;
  else{h+=`<div class="chips">`+st.weakConcepts.slice(0,12).map(cc=>`<span class="chip">${esc(cc.k)} · ${cc.wrong}개</span>`).join("")+`</div>`;}
  h+=`</div>`;
  return h;
}

/* ============================ 8. 교사 대시보드 ============================ */
async function loadAllRecords(){
  const out=[];
  if(!(window.storage&&window.storage.list))return out;
  let keys=[];
  try{const r=await window.storage.list("result:",true);keys=(r&&r.keys)||[];}catch(e){return out}
  for(const k of keys){
    try{const g=await window.storage.get(k,true);if(g&&g.value){const rec=JSON.parse(g.value);if(rec&&rec.items)out.push(rec);}}catch(e){}
  }
  return out;
}

    const box=el("div","qreview");
    box.style.borderColor="#f0d6a8";box.style.background="#fff9ec";
    box.innerHTML=`<div class="tagrow"><span class="tag lv">${m.lv}</span><span class="tag un">${m.un}</span><span class="tag">${m.cc}</span>
      <span class="tag" style="background:#fae2e1;color:#b5403c">오답률 ${Math.round(m.err*100)}% (${m.wrong}/${m.t})</span></div>
      <div style="font-weight:800;margin-bottom:4px">${esc(m.q)}</div>
      <div class="explain">💡 ${esc(m.e)}</div>`;
    c.appendChild(box);
  });

  c.appendChild(el("div","weak",`<h4>📌 학생 전체가 취약한 개념</h4><div class="chips">${
    weakCC.map(x=>`<span class="chip">${esc(x.k)} · ${x.w}회 오답</span>`).join("")||'없음'}</div>`));

  c.appendChild(el("div","divider"));
  c.appendChild(el("h3",null,"🏅 학생별 점수 (최고점 → 최하점)"));
  c.appendChild(el("div","hint","이름을 누르면 개별 리포트와 분석을 볼 수 있어요."));
  const list=el("div");
  students.forEach((rec,i)=>{
    const row=el("div","stu-row");
    row.innerHTML=`<span class="rank">${i+1}</span>
      <span class="nm">${esc(rec.name)} <span class="muted small" style="font-weight:600">· ${esc(rec.range)}</span></span>
      <span class="sc">${rec.pct}% <span class="muted small" style="font-weight:600">(${rec.correct}/${rec.total})</span></span>`;
    row.addEventListener("click",()=>renderTeacherStudent(rec,records));
    list.appendChild(row);
  });
  c.appendChild(list);
  window.scrollTo(0,0);
}
function renderTeacherStudent(rec,allRecords){
  root.innerHTML="";
  const c=el("div","card");
  c.innerHTML=`<button class="back" id="bk">← 학생 목록</button>
    <div class="tab">개별 리포트 <span class="badge">${esc(rec.name)}</span></div>
    <h2>${esc(rec.name)}님 분석</h2>
    <p class="muted small">범위 ${esc(rec.range)} · 제출 ${new Date(rec.ts).toLocaleString("ko-KR")}</p>`;
  const body=el("div");body.innerHTML=reportInnerHTML(rec.items,rec.name);
  c.appendChild(body);

  const wrongs=rec.items.filter(r=>!r.correct);
  if(wrongs.length){
    c.appendChild(el("div","divider"));
    c.appendChild(el("h3",null,`${esc(rec.name)}님이 틀린 문제 (${wrongs.length})`));
    wrongs.forEach(r=>{
      const box=el("div","qreview wrong");
      let ph=r.p?`<div class="passage">${passageHTML(r.p)}</div>`:"";
      box.innerHTML=`<div class="tagrow"><span class="tag lv">${r.lv}</span><span class="tag un">${r.un}</span><span class="tag">${r.cc}</span></div>
        <div style="font-weight:800;margin-bottom:4px">${esc(r.q)}</div>${ph}
        <div class="ans-line"><span class="x">학생 답:</span> ${esc(r.user)} &nbsp; <span class="o">정답:</span> ${esc(r.correctAns)}</div>
        <div class="explain">💡 ${esc(r.e)}</div>`;
      c.appendChild(box);
    });
  }
  root.appendChild(c);
  $("#bk").addEventListener("click",renderTeacher);
  window.scrollTo(0,0);
}
